<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2-3歳便秘AI MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel" aria-live="polite">
        <div id="progress" class="progress" hidden>
          <div class="progress__meta">
            <span id="progressLabel">基本確認</span>
            <span id="progressCount">1 / 6</span>
          </div>
          <div class="progress__track"><div id="progressBar" class="progress__bar"></div></div>
        </div>

        <div id="screen"></div>

        <nav id="nav" class="nav" hidden>
          <button id="backButton" class="button button--secondary" type="button">戻る</button>
          <button id="nextButton" class="button" type="button">次へ</button>
        </nav>
      </section>

      <aside id="doctorPanel" class="doctor-panel" hidden>
        <div class="doctor-panel__header">
          <h2>診察支援ダッシュボード</h2>
          <div class="doctor-panel__actions">
            <button id="toggleDashboardModeButton" class="button button--secondary button--small" type="button" aria-pressed="false">簡略表示</button>
            <button id="copySummaryButton" class="button button--secondary button--small" type="button">サマリーコピー</button>
            <button id="copyFacilityShareButton" class="button button--secondary button--small" type="button">院内共有コピー</button>
            <button id="printPdfButton" class="button button--secondary button--small" type="button">PDF/印刷</button>
          </div>
        </div>
        <div id="summaryOutput" class="review-dashboard"></div>
        <div class="json-block">
          <div class="json-block__header">
            <span>送信JSON</span>
            <button id="copyJsonButton" class="button button--secondary button--small" type="button">JSONコピー</button>
          </div>
          <details class="json-details">
            <summary>開く</summary>
            <pre id="jsonOutput"></pre>
          </details>
        </div>
      </aside>
    </main>

    <script src="./src/questionnaire.js?v=20260505-1"></script>
    <script src="./src/app.js?v=20260505-3"></script>
  </body>
</html>
